apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: review-api-alerts
  labels:
    app.kubernetes.io/name: review-api
    release: prometheus
spec:
  groups:
    - name: review-api.availability
      rules:
        - alert: review-apiHighErrorRate
          expr: sum(rate(http_requests_total{service="review-api",status=~"5.."}[5m])) / sum(rate(http_requests_total{service="review-api"}[5m])) > 0.05
          for: 10m
          labels:
            severity: warning
            team: Platform Engineering
          annotations:
            summary: review-api has elevated 5xx responses.
            runbook_url: docs/RUNBOOK.md
        - alert: review-apiUnavailable
          expr: up{job="review-api"} == 0
          for: 5m
          labels:
            severity: critical
            team: Platform Engineering
          annotations:
            summary: review-api is not being scraped or is unavailable.
            runbook_url: docs/RUNBOOK.md
